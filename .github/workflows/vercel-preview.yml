name: Vercel Preview URL を PR に追記

on:
  deployment_status:

jobs:
  update-pr:
    # Vercel が Preview 環境のデプロイを成功させた瞬間にのみ実行
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Preview' &&
      github.event.deployment_status.environment_url != ''

    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: PR を特定してプレビュー URL を追記
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha         = context.payload.deployment.sha;
            const previewUrl  = context.payload.deployment_status.environment_url;

            core.info(`Deployment SHA  : ${sha}`);
            core.info(`Preview URL     : ${previewUrl}`);

            // このコミット SHA に対応するオープン PR を検索
            const { data: prs } = await github.rest.pulls.list({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              state:    'open',
              per_page: 100,
            });

            const pr = prs.find(p => p.head.sha === sha);

            if (!pr) {
              core.info(`SHA ${sha} に対応するオープン PR が見つかりませんでした`);
              return;
            }

            core.info(`PR #${pr.number} を発見: ${pr.title}`);

            const MARKER  = '⏳ デプロイ待機中...';
            const current = pr.body ?? '';

            if (current.includes(MARKER)) {
              // PR 本文のプレースホルダーを実際の URL に置換
              const updated = current.replace(
                `> ${MARKER}`,
                `> 🌐 [Vercel Preview](${previewUrl})`
              );

              await github.rest.pulls.update({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                pull_number: pr.number,
                body:        updated,
              });

              core.info(`PR #${pr.number} の本文を更新しました`);
            } else {
              // マーカーが無い場合はコメントにフォールバック
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: pr.number,
                body:         `## 🌐 Vercel Preview\n\n${previewUrl}`,
              });

              core.info(`PR #${pr.number} にコメントを投稿しました`);
            }
