
services:
  next-app:
    container_name: musuhi_next_app
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    ports:
      - "3001:3000"
      - "5555:5555"  # Prisma Studio
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local
    # DATABASE_URL / DIRECT_URL は .env.local で管理
    tty: true
    command: >
      sh -c "npm install && 
             npx prisma generate && 
             npx prisma db push && 
             npx prisma studio --port 5555 --hostname 0.0.0.0 & 
             npm run dev"

  # ローカルPostgreSQL
  db:
    container_name: musuhi_postgres
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: musuhi_db
      POSTGRES_USER: musuhi_user
      POSTGRES_PASSWORD: musuhi_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musuhi_user -d musuhi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
